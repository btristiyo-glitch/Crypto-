name: Bitget Spot Scanner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    env:
      BITGET_API_KEY: ${{ secrets.BITGET_API_KEY }}
      BITGET_API_SECRET: ${{ secrets.BITGET_API_SECRET }}
      BITGET_API_PASSPHRASE: ${{ secrets.BITGET_API_PASSPHRASE }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: |
          python scanner.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitget-scan-results
          path: output/scan_results.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitget-scan-log
          path: output/scanner.log
          if-no-files-found: warn
          retention-days: 14
          
